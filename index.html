<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연수원 메인</title>
    <style>
        /* 화면 중앙에 팝업 실행 버튼을 배치하는 스타일 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7fa;
            font-family: sans-serif;
            margin: 0;
        }
        .open-popup-btn {
            background: #1a3a5c;
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(26, 58, 92, 0.15);
            transition: background 0.2s, transform 0.1s;
        }
        .open-popup-btn:hover {
            background: #122942;
        }
        .open-popup-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <button class="open-popup-btn" onclick="openChecklist()">안심 체크리스트 확인하기2</button>

    <script>
        function openChecklist() {
            const width = 580;
            const height = 760;
            
            // 모니터 해상도 기준 중앙 좌표 계산
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            //toolbar=no,menubar=no,location=no,status=no
            const windowOptions = `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,location=no,status=no,scrollbars=yes,resizable=yes`;
            
            // 동일 경로에 있는 popup.html을 새 창으로 호출
            window.open("popup.html", "WorkshopChecklistPopup", windowOptions);
        }
    </script>
</body>
</html>
